name: Build VoiceReminder APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download real Gradle wrapper jar
        run: |
          curl -Lo gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/nicholasgasior/gradle-wrapper-jar/raw/main/gradle-wrapper.jar"

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VoiceReminder-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
